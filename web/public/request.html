<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Placeholder Duo — Request a Song</title>
<style>
:root {
  --bg: #0a0a0a;
  --card: #1a1a1a;
  --surface: #252525;
  --primary: #ff8800;
  --green: #2ecc71;
  --text: #f0f0f0;
  --text2: #888;
  --radius: 14px;
  --gap: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font: -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
  padding: 24px 16px;
  -webkit-font-smoothing: antialiased;
}

/* ─── Header ─── */
.header {
  text-align: center; margin-bottom: 24px; width: 100%; max-width: 440px;
}
.header h1 {
  font-size: 28px; font-weight: 800; color: var(--primary);
  letter-spacing: -0.5px; margin-bottom: 4px;
}
.header p {
  font-size: 15px; color: var(--text2);
}

/* ─── Form ─── */
.form-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px; width: 100%; max-width: 440px;
}
.form-card h2 {
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
}
.field {
  margin-bottom: 14px;
}
.field label {
  display: block; font-size: 12px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
}
.field input {
  width: 100%; background: var(--surface); border: 1px solid #333;
  border-radius: 10px; padding: 14px 16px; font-size: 17px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--primary); }
.field input::placeholder { color: #555; }

.submit-btn {
  width: 100%; background: var(--primary); color: #000;
  border: none; border-radius: 12px; padding: 16px; font-size: 18px;
  font-weight: 700; cursor: pointer; margin-top: 6px;
  transition: transform 0.1s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn:active { transform: scale(0.97); background: #e67a00; }
.submit-btn:disabled { background: #444; color: #777; cursor: not-allowed; }

.success {
  background: rgba(46, 204, 113, 0.15); border: 1px solid var(--green);
  border-radius: var(--radius); padding: 18px; text-align: center;
  margin-top: 14px; display: none;
}
.success.show { display: block; }
.success .icon { font-size: 36px; margin-bottom: 6px; }
.success .msg { font-size: 16px; font-weight: 600; color: var(--green); }

.error {
  background: rgba(255, 69, 58, 0.12); border: 1px solid #ff453a;
  border-radius: 10px; padding: 12px; text-align: center;
  font-size: 14px; color: #ff453a; margin-top: 12px; display: none;
}
.error.show { display: block; }

/* ─── Song Library Hint ─── */
.song-hints {
  width: 100%; max-width: 440px; margin-top: 18px;
  background: var(--card); border-radius: var(--radius); padding: 16px;
}
.song-hints h3 {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
}
.song-hints ul {
  list-style: none; display: flex; flex-wrap: wrap; gap: 8px;
}
.song-hints li {
  font-size: 13px; color: var(--text2); background: var(--surface);
  padding: 6px 12px; border-radius: 20px; cursor: pointer;
  transition: background 0.15s;
}
.song-hints li:hover, .song-hints li:active { background: #333; color: var(--primary); }

/* ─── Admin View ─── */
.admin-toggle {
  position: fixed; bottom: 20px; right: 20px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface); border: 1px solid #333;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 100;
  font-size: 20px; -webkit-tap-highlight-color: transparent;
}
.admin-panel {
  display: none; width: 100%; max-width: 440px; margin-top: 24px;
  background: var(--card); border-radius: var(--radius); padding: 20px;
}
.admin-panel.show { display: block; }
.admin-panel h2 {
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
  color: var(--primary);
}
.request-item {
  background: var(--surface); border-radius: 10px; padding: 14px;
  margin-bottom: 8px; display: flex; justify-content: space-between;
  align-items: center;
}
.request-item .info { flex: 1; }
.request-item .name { font-size: 14px; color: var(--text2); margin-bottom: 2px; }
.request-item .song { font-size: 18px; font-weight: 700; color: var(--text); }
.request-item .artist { font-size: 14px; color: var(--primary); }
.request-item .time { font-size: 11px; color: #555; margin-top: 4px; }
.request-item .done-btn {
  background: var(--green); color: #000; border: none;
  width: 32px; height: 32px; border-radius: 50%; font-size: 16px;
  cursor: pointer; flex-shrink: 0; margin-left: 10px;
  -webkit-tap-highlight-color: transparent;
}
.request-item.done { opacity: 0.35; }
.request-item.done .done-btn { background: #444; }

.refresh-btn {
  display: inline-block; background: var(--surface); color: var(--text2);
  border: 1px solid #333; border-radius: 8px; padding: 8px 16px;
  font-size: 13px; cursor: pointer; margin-top: 10px;
}
.admin-actions { display: flex; gap: 8px; margin-bottom: 14px; }
.admin-actions button {
  background: var(--surface); color: var(--text); border: 1px solid #333;
  border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer;
}

.password-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 200; align-items: center; justify-content: center;
}
.password-overlay.show { display: flex; }
.password-box {
  background: var(--card); border-radius: var(--radius); padding: 28px;
  width: 90%; max-width: 320px; text-align: center;
}
.password-box h2 { font-size: 20px; margin-bottom: 16px; }
.password-box input {
  width: 100%; background: var(--surface); border: 1px solid #333;
  border-radius: 10px; padding: 14px; font-size: 18px;
  color: var(--text); text-align: center; outline: none; margin-bottom: 12px;
}
.password-box input:focus { border-color: var(--primary); }

.admin-badge {
  display: inline-block; background: var(--primary); color: #000;
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  margin-left: 6px; vertical-align: middle;
}

.request-count {
  background: var(--primary); color: #000;
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  margin-left: 8px;
}

.auto-refresh-indicator {
  font-size: 11px; color: var(--green); margin-left: 8px;
  display: none;
}
.auto-refresh-indicator.show { display: inline; }

.footer-note {
  width: 100%; max-width: 440px; text-align: center;
  margin-top: 40px; font-size: 12px; color: #444;
}
</style>
</head>
<body>

<div class="header">
  <h1><span style="color:#888;">Placeholder</span> Duo</h1>
  <p>Live Band Karaoke — request a song!</p>
</div>

<form class="form-card" id="requestForm">
  <h2>Your Request</h2>
  <div class="field">
    <label>Your Name</label>
    <input type="text" id="nameInput" placeholder="e.g. Sarah" autocomplete="off" required>
  </div>
  <div class="field">
    <label>Song Title</label>
    <input type="text" id="songInput" placeholder="e.g. Wagon Wheel" autocomplete="off" required>
  </div>
  <div class="field">
    <label>Artist (optional)</label>
    <input type="text" id="artistInput" placeholder="e.g. Darius Rucker" autocomplete="off">
  </div>
  <button type="submit" class="submit-btn" id="submitBtn">Submit Request</button>

  <div class="success" id="successMsg">
    <div class="icon"></div>
    <div class="msg">Got it! Danny will see your request.</div>
  </div>
  <div class="error" id="errorMsg"></div>
</form>

<div class="song-hints">
  <h3>Song Library</h3>
  <ul id="songLibrary"></ul>
</div>

<!-- Admin toggle -->
<div class="admin-toggle" id="adminToggle" title="Admin">&#9881;</div>

<!-- Password overlay -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-box">
    <h2>Admin Access</h2>
    <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
    <button class="submit-btn" id="passwordSubmit">Unlock</button>
  </div>
</div>

<!-- Admin panel -->
<div class="admin-panel" id="adminPanel">
  <h2>Song Requests <span class="request-count" id="requestCount">0</span><span class="auto-refresh-indicator" id="autoRefreshDot">LIVE</span></h2>
  <div class="admin-actions">
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
    <button class="refresh-btn" id="clearDoneBtn">Clear Done</button>
  </div>
  <div id="requestList"></div>
</div>

<div class="footer-note" id="footerNote">
  Placeholder Duo &copy; 2026
</div>

<script>
(function() {
  'use strict';

  var BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019f5394-f14c-7b1b-ba94-c35546262ffa';
  var LOCAL_API = (function() {
    // Use the same hostname the user reached this page with, just change port
    var host = window.location.hostname || 'rig.local';
    return 'http://' + host + ':3300';
  })();
  var ADMIN_PASSWORD = 'liveband';
  var POLL_INTERVAL = 5000;

  var state = {
    submissions: [],
    isAdmin: false,
    pollTimer: null,
    lastModified: 0,
    useLocalApi: false
  };

  var songLibrary = [
    "Wagon Wheel", "Friends in Low Places", "Wanted Dead or Alive",
    "Sweet Home Alabama", "Ring of Fire", "Country Roads",
    "Free Fallin'", "Brown Eyed Girl", "Margaritaville",
    "Summer of 69", "Hotel California", "Take It Easy",
    "Folsom Prison Blues", "Tennessee Whiskey", "Simple Man",
    "Wonderwall", "Hey Jude", "American Pie",
    "Piano Man", "Sweet Child O' Mine", "Purple Rain",
    "Living on a Prayer", "Don't Stop Believin'", "Bohemian Rhapsody",
  ];

  // ─── DOM refs ───
  var form = document.getElementById('requestForm');
  var nameInput = document.getElementById('nameInput');
  var songInput = document.getElementById('songInput');
  var artistInput = document.getElementById('artistInput');
  var submitBtn = document.getElementById('submitBtn');
  var successMsg = document.getElementById('successMsg');
  var errorMsg = document.getElementById('errorMsg');
  var songList = document.getElementById('songLibrary');
  var adminToggle = document.getElementById('adminToggle');
  var passwordOverlay = document.getElementById('passwordOverlay');
  var passwordInput = document.getElementById('passwordInput');
  var passwordSubmit = document.getElementById('passwordSubmit');
  var adminPanel = document.getElementById('adminPanel');
  var requestList = document.getElementById('requestList');
  var requestCount = document.getElementById('requestCount');
  var autoRefreshDot = document.getElementById('autoRefreshDot');
  var refreshBtn = document.getElementById('refreshBtn');
  var clearDoneBtn = document.getElementById('clearDoneBtn');

  // ─── Song library hints ───
  songLibrary.forEach(function(song) {
    var li = document.createElement('li');
    li.textContent = song;
    li.addEventListener('click', function() {
      songInput.value = song;
      songInput.focus();
    });
    songList.appendChild(li);
  });

  // ─── Form submission ───
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var name = nameInput.value.trim();
    var song = songInput.value.trim();
    var artist = artistInput.value.trim();

    if (!name || !song) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');

    fetchAndAppend(name, song, artist || '', function(err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Request';
      if (err) {
        errorMsg.textContent = 'Something went wrong. Try again?';
        errorMsg.classList.add('show');
      } else {
        successMsg.querySelector('.icon').textContent = '';
        successMsg.querySelector('.msg').textContent = 'Got it! Danny will see your request.';
        successMsg.classList.add('show');
        nameInput.value = '';
        songInput.value = '';
        artistInput.value = '';
        setTimeout(function() { successMsg.classList.remove('show'); }, 4000);
      }
    });
  });

  function fetchAndAppend(name, song, artist, callback) {
    if (state.useLocalApi) {
      // Submit directly to the show server on venue WiFi
      fetch(LOCAL_API + '/api/singer/external-add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ singer: name, song_title: song, song_artist: artist || '' })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          callback(null);
          if (state.isAdmin) loadSubmissions();
        } else {
          callback(new Error(data.error || 'Failed'));
        }
      })
      .catch(function() {
        // Fall back to jsonblob if local fails
        state.useLocalApi = false;
        fetchAndAppendBlob(name, song, artist, callback);
      });
    } else {
      fetchAndAppendBlob(name, song, artist, callback);
    }
  }

  function fetchAndAppendBlob(name, song, artist, callback) {
    fetch(BLOB_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var subs = data.submissions || [];
        subs.push({
          name: name,
          song: song,
          artist: artist,
          done: false,
          time: Date.now()
        });
        return fetch(BLOB_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ submissions: subs })
        });
      })
      .then(function(r) {
        if (!r.ok) throw new Error('PUT failed');
        callback(null);
        if (state.isAdmin) loadSubmissions();
      })
      .catch(function(err) {
        callback(err);
      });
  }

  // Detect local API on load
  function detectLocalApi() {
    fetch(LOCAL_API + '/api/health', { mode: 'cors' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.status === 'ok') {
          state.useLocalApi = true;
          console.log('Connected to venue WiFi — using local server');
        }
      })
      .catch(function() {
        state.useLocalApi = false;
        console.log('Off-venue — using cloud storage');
      });
  }

  // ─── Admin ───
  adminToggle.addEventListener('click', function() {
    if (state.isAdmin) {
      toggleAdmin(false);
    } else {
      passwordInput.value = '';
      passwordOverlay.classList.add('show');
      setTimeout(function() { passwordInput.focus(); }, 200);
    }
  });

  passwordSubmit.addEventListener('click', function() {
    if (passwordInput.value === ADMIN_PASSWORD) {
      passwordOverlay.classList.remove('show');
      toggleAdmin(true);
    } else {
      passwordInput.style.borderColor = '#ff453a';
      setTimeout(function() { passwordInput.style.borderColor = ''; }, 800);
    }
  });

  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') passwordSubmit.click();
  });

  function toggleAdmin(on) {
    state.isAdmin = on;
    if (on) {
      adminPanel.classList.add('show');
      adminToggle.innerHTML = '&#10005;';
      loadSubmissions();
      startPolling();
    } else {
      adminPanel.classList.remove('show');
      adminToggle.innerHTML = '&#9881;';
      stopPolling();
    }
  }

  function startPolling() {
    if (state.pollTimer) return;
    autoRefreshDot.classList.add('show');
    state.pollTimer = setInterval(function() {
      if (state.isAdmin) loadSubmissions();
    }, POLL_INTERVAL);
  }

  function stopPolling() {
    if (state.pollTimer) {
      clearInterval(state.pollTimer);
      state.pollTimer = null;
    }
    autoRefreshDot.classList.remove('show');
  }

  function loadSubmissions() {
    if (state.useLocalApi) {
      // Use local singer queue
      fetch(LOCAL_API + '/api/singer/queue?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          state.submissions = (data.queue || []).map(function(e) {
            return {
              name: e.singer || 'Guest',
              song: e.song_title || '?',
              artist: e.song_artist || '',
              done: false,
              time: e.timestamp || Date.now(),
              id: e.id
            };
          });
          renderAdmin();
        })
        .catch(function() {});
    } else {
      fetch(BLOB_URL + '?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          state.submissions = data.submissions || [];
          renderAdmin();
        })
        .catch(function() {});
    }
  }

  function renderAdmin() {
    var subs = state.submissions;
    var pending = subs.filter(function(s) { return !s.done; });
    var done = subs.filter(function(s) { return s.done; });

    requestCount.textContent = pending.length;

    if (subs.length === 0) {
      requestList.innerHTML = '<div style="text-align:center;color:#555;padding:24px;font-size:14px;">No requests yet</div>';
      return;
    }

    var html = '';
    pending.concat(done).forEach(function(s, i) {
      var timeStr = new Date(s.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      html += '<div class="request-item' + (s.done ? ' done' : '') + '" data-idx="' + i + '">';
      html += '  <div class="info">';
      html += '    <div class="song">' + escapeHtml(s.song) + '</div>';
      html += '    <div class="artist">' + escapeHtml(s.artist || 'No artist') + '</div>';
      html += '    <div class="name">' + escapeHtml(s.name) + ' &mdash; ' + timeStr + '</div>';
      html += '  </div>';
      html += '  <button class="done-btn" data-idx="' + i + '">' + (s.done ? '-' : '&#10003;') + '</button>';
      html += '</div>';
    });
    requestList.innerHTML = html;

    requestList.querySelectorAll('.done-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(this.dataset.idx);
        toggleDone(idx);
      });
    });
  }

  function toggleDone(idx) {
    if (state.useLocalApi) {
      // Delete from local singer queue
      var item = state.submissions[idx];
      if (item && item.id) {
        fetch(LOCAL_API + '/api/singer/queue/' + item.id, { method: 'DELETE' })
          .then(function() { loadSubmissions(); })
          .catch(function() {});
      }
      return;
    }
    state.submissions[idx].done = !state.submissions[idx].done;
    fetch(BLOB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissions: state.submissions })
    }).then(function() {
      renderAdmin();
    }).catch(function() {});
  }

  refreshBtn.addEventListener('click', function() {
    loadSubmissions();
  });

  clearDoneBtn.addEventListener('click', function() {
    if (state.useLocalApi) {
      fetch(LOCAL_API + '/api/singer/clear-round', { method: 'POST' })
        .then(function() { loadSubmissions(); })
        .catch(function() {});
      return;
    }
    state.submissions = state.submissions.filter(function(s) { return !s.done; });
    fetch(BLOB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissions: state.submissions })
    }).then(function() {
      renderAdmin();
    }).catch(function() {});
  });

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ─── Clean up interval ───
  window.addEventListener('beforeunload', function() {
    stopPolling();
  });

  console.log('Placeholder Duo — Request a Song ready');

  // Detect if on venue WiFi
  detectLocalApi();

})();
</script>
</body>
</html>
